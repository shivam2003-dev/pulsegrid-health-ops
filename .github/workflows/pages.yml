name: Deploy PulseGrid to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate JavaScript
        run: npm run check

      - name: Validate static site
        run: npm run test:site

      - name: Validate required artifacts
        run: |
          test -f index.html
          test -f dashboard.html
          test -f intake.html
          test -f inventory.html
          test -f orders.html
          test -f forecasts.html
          test -f redistribution.html
          test -f facilities.html
          test -f enterprise.html
          test -f research.html
          test -f admin.html
          test -f architecture.html
          test -f submission.html
          test -f styles.css
          test -f app.js
          test -f data.js
          test -f RESEARCH_SURVEY.md
          test -f phase.md
          test -f README.md
          test -f SOLUTION.md
          test -f PITCH_DECK.md
          test -f PROJECT_WRITEUP.md

  deploy:
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
