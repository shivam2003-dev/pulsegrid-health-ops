apiVersion: v1
kind: Service
metadata:
  name: arogyagrid-web
  namespace: arogyagrid
  annotations:
    cloud.google.com/neg: '{"exposed_ports":{"80":{"name":"arogyagrid-web-80"}}}'
  labels:
    app.kubernetes.io/name: arogyagrid
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: arogyagrid
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 80
      targetPort: http
